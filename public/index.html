<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a4a1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>斗地主 - 在线对战</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/lobby.css">
</head>
<body>
  <div class="lobby-container">
    <div class="lobby-title">斗 地 主</div>
    <div class="lobby-subtitle">—— 朋友一起玩 ——</div>

    <div class="lobby-panel" id="loginPanel">
      <div class="lobby-section">
        <label class="lobby-label">你的昵称</label>
        <input
          type="text"
          class="lobby-input"
          id="nameInput"
          placeholder="请输入昵称（最多12字）"
          maxlength="12"
          autocomplete="off"
        >
      </div>

      <div class="lobby-section">
        <button class="lobby-btn lobby-btn-primary" id="createBtn">创建房间</button>
      </div>

      <div class="lobby-divider"><span>或</span></div>

      <div class="lobby-section">
        <label class="lobby-label">加入房间</label>
        <input
          type="text"
          class="lobby-input"
          id="roomCodeInput"
          placeholder="输入6位房间号"
          maxlength="6"
          autocomplete="off"
        >
      </div>

      <button class="lobby-btn lobby-btn-secondary" id="joinBtn">加入房间</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <!-- Test mode toggle -->
    <div class="test-mode-toggle" id="testModeToggle" title="测试模式：单人即可开始，剩余席位由AI机器人填充">
      <span class="test-mode-icon">🤖</span>
      <span class="test-mode-label">测试</span>
    </div>

    <!-- Room created / waiting panel -->
    <div class="lobby-panel hidden" id="roomPanel">
      <div class="room-created">
        <div class="lobby-label">房间号</div>
        <div class="room-code-display" id="roomCodeDisplay"></div>
        <div class="room-link" id="roomLink"></div>
        <button class="copy-btn" id="copyBtn">复制链接</button>
      </div>

      <div class="player-list" id="playerList">
        <!-- dynamically filled -->
      </div>

      <div class="start-game-area">
        <button class="start-game-btn" id="startGameBtn" disabled>等待玩家加入...</button>
      </div>

      <div class="status-msg" id="roomStatusMsg"></div>
    </div>
  </div>

  <script>fetch('version.txt?'+Date.now()).then(r=>r.text()).then(t=>{if(t.trim())document.title='斗地主 | '+t.trim()}).catch(()=>{})</script>
  <script src="socket.io/socket.io.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/lobby.js"></script>
</body>
</html>
