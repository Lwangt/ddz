<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a4a1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>斗地主 - 游戏中</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <!-- Visible image test strip — shows at very bottom of page -->
  <div id="imgTest" style="position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(0,0,0,0.9);padding:4px;display:flex;gap:4px;overflow-x:auto;font-size:10px;color:#fff">
    <span style="color:#ffd700;white-space:nowrap;padding:2px 4px">BG:</span>
    <span id="bg1s"><img src="image/bg/bg1.png" id="pre-bg1" style="width:30px;height:22px" onload="bg1s.textContent='✅'" onerror="bg1s.textContent='❌1'"></span>
    <span id="bg2s"><img src="image/bg/bg2.png" id="pre-bg2" style="width:30px;height:22px" onload="bg2s.textContent='✅'" onerror="bg2s.textContent='❌2'"></span>
    <span id="bg3s"><img src="image/bg/bg3.png" id="pre-bg3" style="width:30px;height:22px" onload="bg3s.textContent='✅'" onerror="bg3s.textContent='❌3'"></span>
    <span id="bg4s"><img src="image/bg/bg4.png" id="pre-bg4" style="width:30px;height:22px" onload="bg4s.textContent='✅'" onerror="bg4s.textContent='❌4'"></span>
    <span id="bg5s"><img src="image/bg/bg5.png" id="pre-bg5" style="width:30px;height:22px" onload="bg5s.textContent='✅'" onerror="bg5s.textContent='❌5'"></span>
    <span id="bg6s"><img src="image/bg/bg6.png" id="pre-bg6" style="width:30px;height:22px" onload="bg6s.textContent='✅'" onerror="bg6s.textContent='❌6'"></span>
    <span id="bg7s"><img src="image/bg/bg7.png" id="pre-bg7" style="width:30px;height:22px" onload="bg7s.textContent='✅'" onerror="bg7s.textContent='❌7'"></span>
    <span style="color:#ffd700;white-space:nowrap;padding:2px 4px">Role:</span>
    <span id="r1s"><img src="image/role/角色1.png" id="pre-role1" style="width:18px;height:22px" onload="r1s.textContent='✅'" onerror="r1s.textContent='❌1'"></span>
    <span id="r2s"><img src="image/role/角色2.png" id="pre-role2" style="width:18px;height:22px" onload="r2s.textContent='✅'" onerror="r2s.textContent='❌2'"></span>
    <span id="r3s"><img src="image/role/角色3.png" id="pre-role3" style="width:18px;height:22px" onload="r3s.textContent='✅'" onerror="r3s.textContent='❌3'"></span>
    <span id="r4s"><img src="image/role/角色4.png" id="pre-role4" style="width:18px;height:22px" onload="r4s.textContent='✅'" onerror="r4s.textContent='❌4'"></span>
    <span id="r5s"><img src="image/role/角色5.png" id="pre-role5" style="width:18px;height:22px" onload="r5s.textContent='✅'" onerror="r5s.textContent='❌5'"></span>
  </div>
  <canvas id="gameCanvas"></canvas>

  <!-- Game over overlay -->
  <div class="overlay hidden" id="gameOverOverlay">
    <div class="overlay-panel">
      <div class="overlay-title" id="gameOverTitle"></div>
      <div class="overlay-scores" id="gameOverScores"></div>
      <button class="overlay-btn" id="readyNextBtn">准备下一局</button>
      <div style="margin-top:10px;font-size:13px;color:rgba(255,255,255,0.5)" id="readyStatus"></div>
    </div>
  </div>

  <!-- Rotate device prompt -->
  <div class="overlay hidden" id="rotateOverlay">
    <div class="overlay-panel">
      <div style="font-size:48px;margin-bottom:12px">📱</div>
      <div class="overlay-title">请旋转手机</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-top:8px">横屏体验更佳</div>
      <button class="overlay-btn" id="rotateBtn" style="margin-top:18px;width:100%">点击切换横屏</button>
      <div id="rotateError" style="margin-top:10px;font-size:12px;color:#ff8a80;display:none"></div>
    </div>
  </div>

  <!-- Waiting for players overlay -->
  <div class="overlay hidden" id="waitingOverlay">
    <div class="overlay-panel">
      <div class="waiting-msg">
        <span class="waiting-spinner"></span>
        等待其他玩家加入...
      </div>
      <div style="margin-top:10px;font-size:14px;color:rgba(255,255,255,0.5)">
        房间号：<span id="waitingRoomCode"></span>
      </div>
    </div>
  </div>

  <script>fetch('version.txt?'+Date.now()).then(r=>r.text()).then(t=>{if(t.trim())document.title='斗地主 | '+t.trim()}).catch(()=>{})</script>
  <script src="socket.io/socket.io.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/canvas/cardDrawer.js"></script>
  <script src="js/canvas/layout.js"></script>
  <script src="js/canvas/renderer.js"></script>
  <script src="js/canvas/animations.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/input.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
