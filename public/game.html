<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a4a1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>斗地主 - 游戏中</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <!-- Preload images — offscreen with 1x1 size to trigger mobile loading -->
  <div style="position:fixed;left:-9999px;top:0;width:12px;height:12px;overflow:visible" aria-hidden="true">
    <img src="img/bg/1" id="pre-bg1" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/bg/bg1.png'">
    <img src="img/bg/2" id="pre-bg2" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/bg/bg2.png'">
    <img src="img/bg/3" id="pre-bg3" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/bg/bg3.png'">
    <img src="img/bg/4" id="pre-bg4" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/bg/bg4.png'">
    <img src="img/bg/5" id="pre-bg5" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/bg/bg5.png'">
    <img src="img/bg/6" id="pre-bg6" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/bg/bg6.png'">
    <img src="img/bg/7" id="pre-bg7" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/bg/bg7.png'">
    <img src="img/role/1" id="pre-role1" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/role/角色1.png'">
    <img src="img/role/2" id="pre-role2" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/role/角色2.png'">
    <img src="img/role/3" id="pre-role3" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/role/角色3.png'">
    <img src="img/role/4" id="pre-role4" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/role/角色4.png'">
    <img src="img/role/5" id="pre-role5" style="width:1px;height:1px" onerror="this.dataset.err='1';this.src='image/role/角色5.png'">
  </div>
  <canvas id="gameCanvas"></canvas>

  <!-- Game over overlay -->
  <div class="overlay hidden" id="gameOverOverlay">
    <div class="overlay-panel">
      <div class="overlay-title" id="gameOverTitle"></div>
      <div class="overlay-scores" id="gameOverScores"></div>
      <button class="overlay-btn" id="readyNextBtn">准备下一局</button>
      <div style="margin-top:10px;font-size:13px;color:rgba(255,255,255,0.5)" id="readyStatus"></div>
    </div>
  </div>

  <!-- Rotate device prompt -->
  <div class="overlay hidden" id="rotateOverlay">
    <div class="overlay-panel">
      <div style="font-size:48px;margin-bottom:12px">📱</div>
      <div class="overlay-title">请旋转手机</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-top:8px">横屏体验更佳</div>
      <button class="overlay-btn" id="rotateBtn" style="margin-top:18px;width:100%">点击切换横屏</button>
      <div id="rotateError" style="margin-top:10px;font-size:12px;color:#ff8a80;display:none"></div>
    </div>
  </div>

  <!-- Waiting for players overlay -->
  <div class="overlay hidden" id="waitingOverlay">
    <div class="overlay-panel">
      <div class="waiting-msg">
        <span class="waiting-spinner"></span>
        等待其他玩家加入...
      </div>
      <div style="margin-top:10px;font-size:14px;color:rgba(255,255,255,0.5)">
        房间号：<span id="waitingRoomCode"></span>
      </div>
    </div>
  </div>

  <script>fetch('version.txt?'+Date.now()).then(r=>r.text()).then(t=>{if(t.trim())document.title='斗地主 | '+t.trim()}).catch(()=>{})</script>
  <script src="socket.io/socket.io.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/canvas/cardDrawer.js"></script>
  <script src="js/canvas/layout.js"></script>
  <script src="js/canvas/renderer.js"></script>
  <script src="js/canvas/animations.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/input.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
